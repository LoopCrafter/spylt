name: Build & Deploy Spylt (React)

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USER }}/spylt:latest .

      - name: Push image
        run: |
          docker push ${{ secrets.DOCKER_USER }}/spylt:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          script: |
            mkdir -p /root/apps/spylt

            cd /root/apps/spylt
            docker pull ${{ secrets.DOCKER_USER }}/spylt:latest

            docker compose up -d --force-recreate
